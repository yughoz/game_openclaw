<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Agent Colony - Multi-Agent Workspace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            min-height: 100vh;
            overflow: hidden;
            image-rendering: pixelated;
        }

        /* Game Container */
        .game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Office Background */
        .office-bg {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(180deg, #2d3436 0%, #1a1a2e 100%);
        }

        /* Grid overlay for retro feel */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }

        /* Zones */
        .zone {
            position: absolute;
            border-radius: 20px;
            border: 3px dashed;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .zone:hover {
            transform: scale(1.02);
        }

        .zone-header {
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .zone-content {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 15px;
            min-height: 100px;
        }

        /* Work Zone */
        .zone-work {
            top: 5%;
            left: 2%;
            width: 45%;
            height: 45%;
            background: rgba(231, 76, 60, 0.1);
            border-color: rgba(231, 76, 60, 0.5);
        }

        .zone-work .zone-header { color: #e74c3c; }

        /* Rest Zone */
        .zone-rest {
            top: 5%;
            right: 2%;
            width: 25%;
            height: 30%;
            background: rgba(46, 204, 113, 0.1);
            border-color: rgba(46, 204, 113, 0.5);
        }

        .zone-rest .zone-header { color: #2ecc71; }

        /* Meeting Zone */
        .zone-meeting {
            top: 52%;
            left: 2%;
            width: 30%;
            height: 43%;
            background: rgba(155, 89, 182, 0.1);
            border-color: rgba(155, 89, 182, 0.5);
        }

        .zone-meeting .zone-header { color: #9b59b6; }

        /* Error Zone */
        .zone-error {
            bottom: 5%;
            right: 2%;
            width: 20%;
            height: 25%;
            background: rgba(241, 196, 15, 0.1);
            border-color: rgba(241, 196, 15, 0.5);
        }

        .zone-error .zone-header { color: #f1c40f; }

        /* Queue Zone */
        .zone-queue {
            top: 37%;
            right: 2%;
            width: 25%;
            height: 28%;
            background: rgba(52, 152, 219, 0.1);
            border-color: rgba(52, 152, 219, 0.5);
        }

        .zone-queue .zone-header { color: #3498db; }

        /* Orchestrator Zone */
        .zone-orchestrator {
            bottom: 5%;
            left: 35%;
            width: 28%;
            height: 25%;
            background: rgba(255, 107, 107, 0.1);
            border-color: rgba(255, 107, 107, 0.5);
        }

        .zone-orchestrator .zone-header { color: #ff6b6b; }

        /* Agent Character */
        .agent {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
        }

        .agent:hover {
            transform: scale(1.1);
        }

        .agent-sprite {
            width: 48px;
            height: 48px;
            background: var(--agent-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            position: relative;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .agent-sprite::before {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%);
        }

        /* Working animation */
        .agent.working .agent-sprite {
            animation: working-bounce 0.5s ease-in-out infinite;
        }

        @keyframes working-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Thinking animation */
        .agent.thinking .agent-sprite::after {
            content: '💭';
            position: absolute;
            top: -25px;
            right: -15px;
            font-size: 1rem;
            animation: float-up 1.5s ease-in-out infinite;
        }

        @keyframes float-up {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-10px); opacity: 0.5; }
        }

        .agent-name {
            margin-top: 8px;
            font-size: 0.7rem;
            color: #fff;
            text-align: center;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .agent-status {
            margin-top: 4px;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        .agent-status.idle { background: rgba(150,150,150,0.3); color: #888; }
        .agent-status.writing { background: rgba(231, 76, 60, 0.3); color: #e74c3c; }
        .agent-status.researching { background: rgba(52, 152, 219, 0.3); color: #3498db; }
        .agent-status.executing { background: rgba(241, 196, 15, 0.3); color: #f1c40f; }
        .agent-status.syncing { background: rgba(155, 89, 182, 0.3); color: #9b59b6; }
        .agent-status.error { background: rgba(192, 57, 43, 0.3); color: #c0392b; }

        /* Status indicator light */
        .agent-light {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--agent-color);
            border: 2px solid #1a1a2e;
        }

        .agent-light.active {
            animation: pulse-light 1s ease-in-out infinite;
        }

        @keyframes pulse-light {
            0%, 100% { box-shadow: 0 0 0 0 var(--agent-color); }
            50% { box-shadow: 0 0 10px 5px var(--agent-color); }
        }

        /* Task Card in Queue */
        .task-card {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid var(--task-color, #3498db);
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .task-card .title {
            color: #fff;
            margin-bottom: 5px;
        }

        .task-card .meta {
            color: #888;
            font-size: 0.65rem;
        }

        /* HUD - Heads Up Display */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 25px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .hud-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hud-title h1 {
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
        }

        .hud-stats {
            display: flex;
            gap: 30px;
        }

        .hud-stat {
            text-align: center;
        }

        .hud-stat .value {
            font-size: 1.5rem;
            color: #48dbfb;
            text-shadow: 0 0 10px rgba(72, 219, 251, 0.5);
        }

        .hud-stat .label {
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-live {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 15px;
            background: rgba(0, 255, 136, 0.2);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .hud-live .dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        /* Connection Lines */
        .connection-lines {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .connection-lines svg {
            width: 100%;
            height: 100%;
        }

        .connection-line {
            stroke: rgba(255,255,255,0.1);
            stroke-width: 2;
            stroke-dasharray: 5, 5;
            fill: none;
        }

        .connection-line.active {
            stroke: rgba(72, 219, 251, 0.5);
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -10; }
        }

        /* Tooltip */
        .tooltip {
            position: fixed;
            background: rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 0.8rem;
            max-width: 250px;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip .title {
            color: #fff;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .tooltip .detail {
            color: #888;
            font-size: 0.7rem;
            line-height: 1.4;
        }

        /* Activity Log */
        .activity-log {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            z-index: 100;
            max-width: 80%;
            overflow-x: auto;
        }

        .log-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #888;
            white-space: nowrap;
        }

        .log-item .time {
            color: #48dbfb;
        }

        .log-item .agent-emoji {
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .zone { transform: scale(0.9); }
        }

        @media (max-width: 900px) {
            .zone { transform: scale(0.8); }
            .hud-stats { gap: 15px; }
        }

        /* Empty state */
        .empty-zone {
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        /* Particle effects */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: float-particle 3s ease-in-out infinite;
        }

        @keyframes float-particle {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { transform: translateY(-50px) rotate(180deg); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Background -->
        <div class="office-bg"></div>
        <div class="grid-overlay"></div>

        <!-- Connection Lines SVG -->
        <div class="connection-lines">
            <svg id="connections-svg"></svg>
        </div>

        <!-- Zones -->
        <div class="zone zone-work" id="zone-work">
            <div class="zone-header">💼 WORK AREA</div>
            <div class="zone-content" id="work-content">
                <div class="empty-zone">Agents working on tasks...</div>
            </div>
        </div>

        <div class="zone zone-rest" id="zone-rest">
            <div class="zone-header">☕ REST AREA</div>
            <div class="zone-content" id="rest-content">
                <div class="empty-zone">Idle agents resting...</div>
            </div>
        </div>

        <div class="zone zone-meeting" id="zone-meeting">
            <div class="zone-header">👥 COLLABORATION</div>
            <div class="zone-content" id="meeting-content">
                <div class="empty-zone">Agents collaborating...</div>
            </div>
        </div>

        <div class="zone zone-error" id="zone-error">
            <div class="zone-header">🐛 DEBUG ZONE</div>
            <div class="zone-content" id="error-content">
                <div class="empty-zone">No errors!</div>
            </div>
        </div>

        <div class="zone zone-queue" id="zone-queue">
            <div class="zone-header">📋 TASK QUEUE</div>
            <div class="zone-content" id="queue-content">
                <div class="empty-zone">No pending tasks</div>
            </div>
        </div>

        <div class="zone zone-orchestrator" id="zone-orchestrator">
            <div class="zone-header">🎮 ORCHESTRATOR</div>
            <div class="zone-content" id="orchestrator-content">
                <div class="empty-zone">Orchestrator offline</div>
            </div>
        </div>

        <!-- HUD -->
        <div class="hud">
            <div class="hud-title">
                <span style="font-size: 1.5rem;">🎮</span>
                <h1>AGENT COLONY</h1>
            </div>
            <div class="hud-stats">
                <div class="hud-stat">
                    <div class="value" id="stat-active">0</div>
                    <div class="label">Active</div>
                </div>
                <div class="hud-stat">
                    <div class="value" id="stat-idle">0</div>
                    <div class="label">Idle</div>
                </div>
                <div class="hud-stat">
                    <div class="value" id="stat-tasks">0</div>
                    <div class="label">Tasks</div>
                </div>
                <div class="hud-stat">
                    <div class="value" id="stat-completed">0</div>
                    <div class="label">Done</div>
                </div>
            </div>
            <div class="hud-live">
                <div class="dot"></div>
                <span id="last-update">LIVE</span>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="activity-log" id="activity-log">
            <!-- Log items will be injected -->
        </div>

        <!-- Tooltip -->
        <div class="tooltip" id="tooltip">
            <div class="title"></div>
            <div class="detail"></div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            starOfficeUrl: 'http://89.21.85.164:19000',
            refreshInterval: 3000,
            agents: {
                'Clawtron': {
                    emoji: '🍄',
                    color: '#ff6b6b',
                    role: 'Orchestrator',
                    type: 'orchestrator'
                },
                'Flashclaw': {
                    emoji: '⚡',
                    color: '#feca57',
                    role: 'Server Agent',
                    type: 'worker'
                },
                'Coding Agent': {
                    emoji: '💻',
                    color: '#48dbfb',
                    role: 'Developer',
                    type: 'worker'
                },
                'DevOps Agent': {
                    emoji: '🔧',
                    color: '#9b59b6',
                    role: 'Infrastructure',
                    type: 'worker'
                },
                'Tester Agent': {
                    emoji: '🧪',
                    color: '#00ff88',
                    role: 'QA',
                    type: 'worker'
                }
            }
        };

        // State
        const state = {
            agents: [],
            tasks: [],
            activityLog: [],
            completedTasks: 0
        };

        // Zone mapping
        const zoneMapping = {
            'idle': 'rest',
            'writing': 'work',
            'researching': 'work',
            'executing': 'work',
            'syncing': 'work',
            'error': 'error',
            'collaborating': 'meeting'
        };

        // Fetch agents
        async function fetchAgents() {
            try {
                const response = await fetch(`${CONFIG.starOfficeUrl}/agents`);
                return await response.json();
            } catch (error) {
                console.error('Failed to fetch agents:', error);
                return [];
            }
        }

        // Create agent element
        function createAgentElement(agentData) {
            const config = CONFIG.agents[agentData.name] || {
                emoji: '🤖',
                color: '#888',
                role: 'Agent',
                type: 'worker'
            };

            const isWorking = agentData.state && agentData.state !== 'idle';
            const isThinking = agentData.state === 'researching';

            const agent = document.createElement('div');
            agent.className = `agent ${isWorking ? 'working' : ''} ${isThinking ? 'thinking' : ''}`;
            agent.style.setProperty('--agent-color', config.color);
            agent.dataset.agentId = agentData.agentId;
            agent.dataset.name = agentData.name;

            agent.innerHTML = `
                <div class="agent-sprite">
                    ${config.emoji}
                    <div class="agent-light ${isWorking ? 'active' : ''}"></div>
                </div>
                <div class="agent-name">${agentData.name}</div>
                <div class="agent-status ${agentData.state || 'idle'}">${agentData.state || 'idle'}</div>
            `;

            // Tooltip on hover
            agent.addEventListener('mouseenter', (e) => showTooltip(e, agentData, config));
            agent.addEventListener('mouseleave', hideTooltip);

            return agent;
        }

        // Show tooltip
        function showTooltip(e, agentData, config) {
            const tooltip = document.getElementById('tooltip');
            tooltip.querySelector('.title').textContent = `${config.emoji} ${agentData.name}`;
            tooltip.querySelector('.detail').innerHTML = `
                <strong>Role:</strong> ${config.role}<br>
                <strong>Status:</strong> ${agentData.state || 'idle'}<br>
                <strong>Task:</strong> ${agentData.detail || 'No active task'}<br>
                <strong>Area:</strong> ${agentData.area || 'unknown'}
            `;
            tooltip.style.left = e.pageX + 15 + 'px';
            tooltip.style.top = e.pageY + 15 + 'px';
            tooltip.classList.add('visible');
        }

        // Hide tooltip
        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        // Clear zone
        function clearZone(zoneId) {
            const content = document.getElementById(`${zoneId}-content`);
            content.innerHTML = '';
        }

        // Add agent to zone
        function addAgentToZone(zoneId, agentElement) {
            const content = document.getElementById(`${zoneId}-content`);
            // Remove empty state if exists
            const empty = content.querySelector('.empty-zone');
            if (empty) empty.remove();
            content.appendChild(agentElement);
        }

        // Render agents
        function renderAgents(agents) {
            // Clear all zones
            ['work', 'rest', 'meeting', 'error', 'orchestrator'].forEach(clearZone);

            agents.forEach(agentData => {
                const config = CONFIG.agents[agentData.name];
                const zone = zoneMapping[agentData.state] || 'rest';
                const agentElement = createAgentElement(agentData);

                // Orchestrator goes to orchestrator zone
                if (config && config.type === 'orchestrator') {
                    addAgentToZone('orchestrator', agentElement);
                } else {
                    addAgentToZone(zone, agentElement);
                }
            });

            // Add empty states back if needed
            ['work', 'rest', 'meeting', 'error', 'orchestrator'].forEach(zoneId => {
                const content = document.getElementById(`${zoneId}-content`);
                if (content.children.length === 0) {
                    const emptyText = {
                        work: 'Agents working on tasks...',
                        rest: 'Idle agents resting...',
                        meeting: 'Agents collaborating...',
                        error: 'No errors!',
                        orchestrator: 'Orchestrator offline'
                    };
                    content.innerHTML = `<div class="empty-zone">${emptyText[zoneId]}</div>`;
                }
            });
        }

        // Render task queue
        function renderTasks() {
            const content = document.getElementById('queue-content');
            content.innerHTML = '';

            if (state.tasks.length === 0) {
                content.innerHTML = '<div class="empty-zone">No pending tasks</div>';
                return;
            }

            state.tasks.slice(0, 5).forEach(task => {
                const taskEl = document.createElement('div');
                taskEl.className = 'task-card';
                taskEl.style.setProperty('--task-color', task.color || '#3498db');
                taskEl.innerHTML = `
                    <div class="title">${task.title || 'Unknown Task'}</div>
                    <div class="meta">${task.assigned_to || 'Unassigned'} • ${task.status || 'pending'}</div>
                `;
                content.appendChild(taskEl);
            });
        }

        // Update stats
        function updateStats(agents) {
            const active = agents.filter(a => a.state && a.state !== 'idle').length;
            const idle = agents.filter(a => !a.state || a.state === 'idle').length;

            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-idle').textContent = idle;
            document.getElementById('stat-tasks').textContent = state.tasks.length;
            document.getElementById('stat-completed').textContent = state.completedTasks;
        }

        // Update timestamp
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-update').textContent = 
                `LIVE ${now.toLocaleTimeString()}`;
        }

        // Add activity log
        function addActivityLog(agent, action) {
            const log = document.getElementById('activity-log');
            const time = new Date().toLocaleTimeString();

            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `
                <span class="time">${time}</span>
                <span class="agent-emoji">${agent}</span>
                <span>${action}</span>
            `;

            log.insertBefore(item, log.firstChild);

            // Keep only last 5 items
            while (log.children.length > 5) {
                log.removeChild(log.lastChild);
            }
        }

        // Create particles
        function createParticles() {
            const container = document.querySelector('.game-container');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(particle);
            }
        }

        // Main update function
        async function update() {
            const agents = await fetchAgents();
            state.agents = agents;

            renderAgents(agents);
            renderTasks();
            updateStats(agents);
            updateTimestamp();
        }

        // Initialize
        function init() {
            createParticles();
            update();
            setInterval(update, CONFIG.refreshInterval);

            // Initial activity log
            addActivityLog('🎮', 'System initialized');
        }

        // Start
        init();
    </script>
</body>
</html>
