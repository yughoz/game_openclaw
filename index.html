<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Agent Colony</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #0a0a12; overflow: hidden; }
        .gc { width: 100vw; height: 100vh; position: relative; }
        .bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0a0a12, #1a1a2e, #16213e); }
        .stars { position: absolute; inset: 0; overflow: hidden; }
        .star { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; animation: t var(--d) infinite; }
        @keyframes t { 0%, 100% { opacity: .2; } 50% { opacity: 1; } }
        .parts { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .part { position: absolute; border-radius: 50%; animation: f var(--d) infinite; opacity: 0; }
        @keyframes f { 0% { transform: translateY(100vh); } 10%, 90% { opacity: .6; } 100% { transform: translateY(-100px); } }
        .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(72,219,251,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(72,219,251,.03) 1px, transparent 1px); background-size: 40px 40px; }
        
        .zone { position: absolute; border-radius: 24px; border: 2px solid; backdrop-filter: blur(10px); }
        .zh { padding: 18px 24px; font-size: .85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; background: rgba(0,0,0,.2); border-radius: 24px 24px 0 0; }
        .zc { flex: 1; min-height: 120px; }
        .zw { top: 5%; left: 2%; width: 45%; height: 45%; background: linear-gradient(135deg, rgba(231,76,60,.15), rgba(192,57,43,.1)); border-color: rgba(231,76,60,.4); }
        .zw .zh { color: #e74c3c; }
        .zr { top: 5%; right: 2%; width: 25%; height: 30%; background: linear-gradient(135deg, rgba(46,204,113,.15), rgba(39,174,96,.1)); border-color: rgba(46,204,113,.4); }
        .zr .zh { color: #2ecc71; }
        .zm { top: 52%; left: 2%; width: 30%; height: 43%; background: linear-gradient(135deg, rgba(155,89,182,.15), rgba(142,68,173,.1)); border-color: rgba(155,89,182,.4); }
        .zm .zh { color: #9b59b6; }
        .ze { bottom: 5%; right: 2%; width: 20%; height: 25%; background: linear-gradient(135deg, rgba(241,196,15,.15), rgba(243,156,18,.1)); border-color: rgba(241,196,15,.4); }
        .ze .zh { color: #f1c40f; }
        .zq { top: 37%; right: 2%; width: 25%; height: 28%; background: linear-gradient(135deg, rgba(52,152,219,.15), rgba(41,128,185,.1)); border-color: rgba(52,152,219,.4); }
        .zq .zh { color: #3498db; }
        .zo { bottom: 5%; left: 35%; width: 28%; height: 25%; background: linear-gradient(135deg, rgba(255,107,107,.15), rgba(254,202,87,.1)); border-color: rgba(255,107,107,.4); }
        .zo .zh { color: #ff6b6b; }
        
        .wl { position: absolute; inset: 0; pointer-events: none; z-index: 50; }
        .ag { position: absolute; width: 80px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: left 1.2s ease, top 1.2s ease; pointer-events: auto; }
        .ag:hover { transform: scale(1.2); z-index: 100; }
        .ag canvas { width: 48px; height: 48px; image-rendering: pixelated; }
        .an { margin-top: 6px; font-size: .65rem; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.8); }
        .as { margin-top: 4px; font-size: .55rem; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; }
        .as.idle { background: rgba(150,150,150,.2); color: #888; }
        .as.writing { background: rgba(231,76,60,.25); color: #e74c3c; }
        .as.researching { background: rgba(52,152,219,.25); color: #3498db; }
        .as.executing { background: rgba(241,196,15,.25); color: #f1c40f; }
        .as.syncing { background: rgba(155,89,182,.25); color: #9b59b6; }
        .as.error { background: rgba(192,57,43,.25); color: #c0392b; }
        
        .hud { position: fixed; top: 0; left: 0; right: 0; padding: 18px 30px; background: linear-gradient(180deg, rgba(0,0,0,.9), transparent); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .hud h1 { font-family: "Press Start 2P", monospace; font-size: .9rem; color: #fff; text-shadow: 0 0 10px rgba(72,219,251,.8); }
        .hs { display: flex; gap: 40px; }
        .hst { text-align: center; }
        .hst .v { font-size: 1.6rem; font-weight: 700; color: #48dbfb; }
        .hst .l { font-size: .55rem; color: #888; text-transform: uppercase; }
        .hl { display: flex; align-items: center; gap: 10px; padding: 8px 18px; background: rgba(0,255,136,.15); border-radius: 25px; }
        .hl .d { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; animation: p 1.5s infinite; }
        .hl .d.err { background: #e74c3c; }
        @keyframes p { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        
        .log { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,18,.9); border-radius: 12px; padding: 10px 20px; display: flex; gap: 20px; z-index: 100; }
        .li { display: flex; align-items: center; gap: 8px; font-size: .7rem; color: #888; }
        .li .tm { color: #48dbfb; }
        
        .tip { position: fixed; background: rgba(10,10,18,.95); border-radius: 12px; padding: 14px 18px; max-width: 260px; z-index: 1000; pointer-events: none; opacity: 0; transition: opacity .3s; }
        .tip.v { opacity: 1; }
        .tip .tt { color: #fff; font-weight: 700; margin-bottom: 8px; }
        .tip .td { color: #aaa; font-size: .7rem; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="gc">
        <div class="bg"></div>
        <div class="stars" id="stars"></div>
        <div class="parts" id="parts"></div>
        <div class="grid"></div>
        <div class="wl" id="layer"></div>
        
        <div class="zone zw"><div class="zh">💼 WORK AREA</div><div class="zc"></div></div>
        <div class="zone zr"><div class="zh">☕ REST AREA</div><div class="zc"></div></div>
        <div class="zone zm"><div class="zh">👥 COLLABORATION</div><div class="zc"></div></div>
        <div class="zone ze"><div class="zh">🐛 DEBUG ZONE</div><div class="zc"></div></div>
        <div class="zone zq"><div class="zh">📋 TASK QUEUE</div><div class="zc"></div></div>
        <div class="zone zo"><div class="zh">🎮 ORCHESTRATOR</div><div class="zc"></div></div>
        
        <div class="hud">
            <div><span style="font-size:1.5rem">🎮</span><h1>AGENT COLONY</h1></div>
            <div class="hs">
                <div class="hst"><div class="v" id="sa">0</div><div class="l">Active</div></div>
                <div class="hst"><div class="v" id="si">0</div><div class="l">Idle</div></div>
                <div class="hst"><div class="v" id="st">0</div><div class="l">Tasks</div></div>
                <div class="hst"><div class="v" id="sd">0</div><div class="l">Done</div></div>
            </div>
            <div class="hl"><div class="d" id="ld"></div><span id="ts">LIVE</span></div>
        </div>
        
        <div class="log" id="log"></div>
        <div class="tip" id="tip"><div class="tt"></div><div class="td"></div></div>
    </div>
    
    <script>
        var CFG = {
            url: 'http://89.21.85.164:19000',
            agents: {
                'Clawtron': { c: '#ff6b6b', r: 'Orchestrator', t: 'orch', sk: '#ffd5b5', hr: '#ff6b6b', sh: '#c0392b', pn: '#2c3e50' },
                'Flashclaw': { c: '#feca57', r: 'Server Agent', t: 'worker', sk: '#e8beac', hr: '#feca57', sh: '#3498db', pn: '#2c3e50' },
                'Coding Agent': { c: '#48dbfb', r: 'Developer', t: 'worker', sk: '#ffd5b5', hr: '#8b4513', sh: '#48dbfb', pn: '#34495e' },
                'DevOps Agent': { c: '#9b59b6', r: 'Infrastructure', t: 'worker', sk: '#d4a574', hr: '#c0392b', sh: '#9b59b6', pn: '#1a1a2e' },
                'Tester Agent': { c: '#00ff88', r: 'QA', t: 'worker', sk: '#ffd5b5', hr: '#1a1a2e', sh: '#27ae60', pn: '#2c3e50' }
            }
        };
        
        var ZP = { work: {x:10,y:18}, rest: {x:78,y:18}, meeting: {x:10,y:65}, error: {x:78,y:72}, orch: {x:48,y:72} };
        var ZM = { idle: 'rest', writing: 'work', researching: 'work', executing: 'work', syncing: 'work', error: 'error' };
        var S = { agents: [], pos: {} };
        
        function mkBg() {
            var i, s, p, c = ['#ff6b6b','#feca57','#48dbfb','#9b59b6','#00ff88'];
            for (i = 0; i < 80; i++) {
                s = document.createElement('div');
                s.className = 'star';
                s.style.cssText = 'left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;--d:' + (2+Math.random()*3) + 's';
                document.getElementById('stars').appendChild(s);
            }
            for (i = 0; i < 20; i++) {
                p = document.createElement('div');
                p.className = 'part';
                p.style.cssText = 'left:' + (Math.random()*100) + '%;width:' + (3+Math.random()*5) + 'px;height:' + (3+Math.random()*5) + 'px;background:' + c[Math.floor(Math.random()*c.length)] + ';--d:' + (8+Math.random()*12) + 's';
                document.getElementById('parts').appendChild(p);
            }
        }
        
        function PixelChar(g) {
            this.g = g;
            this.draw = function(ctx, f) {
                ctx.imageSmoothingEnabled = false;
                ctx.clearRect(0, 0, 16, 16);
                var w = Math.sin(f * 0.15) * 1.5;
                var b = Math.abs(w) * 0.5;
                ctx.save();
                ctx.translate(0, b);
                ctx.fillStyle = 'rgba(0,0,0,.3)';
                ctx.fillRect(5, 14, 6, 1);
                ctx.fillStyle = this.g.pn;
                ctx.fillRect(5, 12, 2, 3 + w);
                ctx.fillRect(9, 12, 2, 3 - w);
                ctx.fillStyle = this.g.sh;
                ctx.fillRect(4, 7, 8, 6);
                ctx.fillStyle = this.g.sk;
                ctx.fillRect(5, 2, 6, 6);
                ctx.fillStyle = this.g.hr;
                ctx.fillRect(5, 1, 6, 2);
                ctx.fillRect(4, 2, 1, 2);
                ctx.fillRect(11, 2, 1, 2);
                ctx.fillStyle = '#fff';
                ctx.fillRect(6, 4, 2, 2);
                ctx.fillRect(9, 4, 2, 2);
                ctx.fillStyle = '#000';
                ctx.fillRect(7, 5, 1, 1);
                ctx.fillRect(10, 5, 1, 1);
                ctx.restore();
            };
        }
        
        function mkAgent(d) {
            var g = CFG.agents[d.name] || CFG.agents['Coding Agent'];
            var el = document.createElement('div');
            el.className = 'ag';
            el.id = 'agent-' + d.name.replace(/\s+/g, '-').toLowerCase();
            
            var cv = document.createElement('canvas');
            cv.width = 16;
            cv.height = 16;
            el.appendChild(cv);
            
            var nm = document.createElement('div');
            nm.className = 'an';
            nm.textContent = d.name;
            el.appendChild(nm);
            
            var st = document.createElement('div');
            st.className = 'as ' + (d.state || 'idle');
            st.textContent = d.state || 'idle';
            el.appendChild(st);
            
            var ch = new PixelChar(g);
            var f = 0;
            el._r = false;
            el._start = function() {
                if (!el._r) {
                    el._r = true;
                    var lp = function() {
                        ch.draw(cv.getContext('2d'), f++);
                        el._id = requestAnimationFrame(lp);
                    };
                    lp();
                }
            };
            el._stop = function() {
                el._r = false;
                if (el._id) cancelAnimationFrame(el._id);
            };
            el._start();
            
            el.onmouseenter = function(e) {
                var t = document.getElementById('tip');
                t.querySelector('.tt').textContent = d.name;
                t.querySelector('.td').innerHTML = '<strong>Role:</strong> ' + g.r + '<br><strong>Status:</strong> ' + (d.state || 'idle') + '<br><strong>Task:</strong> ' + (d.detail || 'None');
                t.style.left = Math.min(e.pageX + 15, innerWidth - 280) + 'px';
                t.style.top = Math.min(e.pageY + 15, innerHeight - 120) + 'px';
                t.classList.add('v');
            };
            el.onmouseleave = function() {
                document.getElementById('tip').classList.remove('v');
            };
            
            return el;
        }
        
        function mv(el, z) {
            var t = ZP[z];
            if (!t) return;
            var cur = parseFloat(el.style.left) || 50;
            if (Math.abs(t.x - cur) > 3) {
                lg(el.querySelector('.an').textContent, '→ ' + z);
            }
            el.style.left = t.x + '%';
            el.style.top = t.y + '%';
        }
        
        function render(ag) {
            if (!ag || !Array.isArray(ag)) return;
            
            var ly = document.getElementById('layer');
            var i, a, g, z, tg, id, el;
            
            for (i = 0; i < ag.length; i++) {
                a = ag[i];
                if (!a || !a.name) continue;
                
                g = CFG.agents[a.name];
                z = ZM[a.state] || 'rest';
                tg = (g && g.t === 'orch') ? 'orch' : z;
                id = 'agent-' + a.name.replace(/\s+/g, '-').toLowerCase();
                
                el = document.getElementById(id);
                if (!el) {
                    el = mkAgent(a);
                    el.style.left = '50%';
                    el.style.top = '50%';
                    ly.appendChild(el);
                    (function(e, t) {
                        setTimeout(function() { mv(e, t); }, 100);
                    })(el, tg);
                } else {
                    el.querySelector('.as').textContent = a.state || 'idle';
                    el.querySelector('.as').className = 'as ' + (a.state || 'idle');
                    var cz = S.pos[a.name];
                    if (cz !== tg) {
                        mv(el, tg);
                        S.pos[a.name] = tg;
                    }
                }
            }
            
            var ids = [];
            for (i = 0; i < ag.length; i++) {
                if (ag[i] && ag[i].name) {
                    ids.push('agent-' + ag[i].name.replace(/\s+/g, '-').toLowerCase());
                }
            }
            
            var els = ly.querySelectorAll('.ag');
            for (i = 0; i < els.length; i++) {
                el = els[i];
                if (ids.indexOf(el.id) === -1) {
                    el._stop();
                    el.style.opacity = '0';
                    (function(e) {
                        setTimeout(function() { e.remove(); }, 500);
                    })(el);
                }
            }
        }
        
        function stats(ag) {
            var safe = ag || [];
            var active = 0, idle = 0, i;
            for (i = 0; i < safe.length; i++) {
                if (safe[i] && safe[i].state && safe[i].state !== 'idle') {
                    active++;
                } else {
                    idle++;
                }
            }
            document.getElementById('sa').textContent = active;
            document.getElementById('si').textContent = idle;
            document.getElementById('st').textContent = '0';
            document.getElementById('sd').textContent = '0';
        }
        
        function lg(n, m) {
            var l = document.getElementById('log');
            var el = document.createElement('div');
            el.className = 'li';
            el.innerHTML = '<span class="tm">' + new Date().toLocaleTimeString() + '</span><span>' + n + '</span><span>' + m + '</span>';
            l.insertBefore(el, l.firstChild);
            while (l.children.length > 4) {
                l.removeChild(l.lastChild);
            }
        }
        
        function up() {
            document.getElementById('ts').textContent = 'LIVE ' + new Date().toLocaleTimeString();
        }
        
        function fetch() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', CFG.url + '/agents', true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        var ag = JSON.parse(xhr.responseText);
                        S.agents = ag;
                        render(ag);
                        stats(ag);
                        up();
                        document.getElementById('ld').classList.remove('err');
                    } catch (e) {
                        console.error('Parse error:', e);
                        stats([]);
                    }
                } else {
                    stats([]);
                    document.getElementById('ld').classList.add('err');
                }
            };
            xhr.onerror = function() {
                stats([]);
                document.getElementById('ld').classList.add('err');
            };
            xhr.send();
        }
        
        function init() {
            mkBg();
            fetch();
            setInterval(fetch, 2000);
            lg('🎮', 'Colony initialized');
        }
        
        init();
    </script>
</body>
</html>
